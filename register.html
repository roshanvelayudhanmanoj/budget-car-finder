<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Budget Car Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">

  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join Budget Car Finder today</p>

      <!-- Alert box for validation messages -->
      <div id="registerAlert" class="alert" role="alert"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="Your full name" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Min. 6 characters" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter password" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </p>
      <a href="index.html" class="back-home">← Back to Home</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
